<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TAME</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            margin: 5px 0;
            font-weight: normal;
            opacity: 0.8;
        }

        .title {
            margin-top: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>김연아</h1>
        <h2>학번: 00000</h2>

        <div class="title">
            TAME: Technological Approach to Minds Everywhere
        </div>
    </div>

</body>
</html>
